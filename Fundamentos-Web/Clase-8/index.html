<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM & Eventos</title>
  </head>
  <body>
    <!-- DOM -->
    <h1>DOM & Eventos</h1>

    <ul id="lista">
      <li id="item1">Item 1</li>
      <li id="item2">Item 2</li>
      <li id="item3">Item 3</li>
    </ul>

    <a href="#" class="enlaces">Enlace 1</a><br />
    <a href="#" class="enlaces">Enlace 2</a><br />
    <a href="#" class="enlaces">Enlace 3</a>

    <!-- EVENTOS -->
    <button id="btn1">Boton 1</button>
    <button id="btn2">Boton 2</button>
    <button id="btn3" onclick="console.log('Click de BTN3')">Boton 3</button>

    <input type="text" id="texto1" placeholder="Click o Mueve el mouse" />
    <br /><br />
    <input type="number" id="numero1" placeholder="Presiona una tecla" />
    <br /><br />
    <input
      type="text"
      id="texto2"
      placeholder="Cambia el texto y sal del input"
    />

    <form id="formulario">
      <input type="text" id="nombre" placeholder="Nombre" />
      <input type="email" id="correo" placeholder="Correo" />
      <input type="password" id="clave" placeholder="Contraseña" />
      <input type="number" id="edad" placeholder="Edad" />
      <button type="submit">Enviar</button>
      <button type="reset" id="resetBtn">Resetear</button>
    </form>

    <script src="./js/main.js"></script>
  </body>
</html>
